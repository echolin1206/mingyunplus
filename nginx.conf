# 命运+ Nginx 配置文件
# 复制到 /etc/nginx/conf.d/mingyunplus.conf 后重启 nginx

upstream mingyunplus {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name mingyunplus.com www.mingyunplus.com;
    
    # 301 跳转到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mingyunplus.com www.mingyunplus.com;
    
    # SSL 证书路径 (请替换为你的真实证书路径)
    ssl_certificate /etc/nginx/ssl/mingyunplus.crt;
    ssl_certificate_key /etc/nginx/ssl/mingyunplus.key;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    
    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/rss+xml text/javascript image/svg+xml;
    
    # 静态文件 (缓存 30 天)
    location ~ ^/(css|js|images|assets)/ {
        root /opt/mingyunplus/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # favicon
    location = /favicon.ico {
        root /opt/mingyunplus/public;
        access_log off;
        log_not_found off;
    }
    
    # 支付宝回调 (需要外网可访问)
    location /api/pay/notify {
        proxy_pass http://mingyunplus;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # API 和页面路由代理到 Node.js
    location / {
        proxy_pass http://mingyunplus;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 日志
    access_log /var/log/nginx/mingyunplus-access.log;
    error_log /var/log/nginx/mingyunplus-error.log;
}
